name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest (>= 11.5.1 required for trusted publishing)
        run: npm install -g npm@latest

      - name: Verify versions
        run: |
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish to npm
        run: npm publish --access public --provenance
